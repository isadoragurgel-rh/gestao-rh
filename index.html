<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GestãoRH — Mão de Obra</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CLIENT_ID = "305248555775-2p7ev3efhkgtoo4mq6ihq7v6u5ararb9.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file";

const genId = () => `${Date.now()}-${Math.random().toString(36).substr(2,6)}`;
const fmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const daysTo = d => d ? Math.ceil((new Date(d) - Date.now()) / 86400000) : null;
const todayStr = () => new Date().toISOString().split('T')[0];
const money = v => v ? `R$ ${parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '—';
const occClr = t => t==='Hora Extra'?'success':t.includes('Falta')?'danger':'warning';
const sitClr = {Ativo:'success',Férias:'info',Afastado:'warning','Afastado INSS':'warning',Demitido:'danger'};

const EMP_FIELDS = ['id','nome','cpf','rg','nasc','sexo','tel','email','cep','rua','num','comp','bairro','cidade','uf','admissao','tipo','fimContrato','sit','demissao','motivo','cargo','funcao','salario','cliente','vr','vrVal','vt','vtVal','fretado','ac','acVal','ferias','ferIni','ferFim','ferDias','banco','agencia','conta','tipoConta','pix','obs','createdAt'];
const OCC_FIELDS = ['id','empId','tipo','data','qtd','obs','createdAt'];
const TIPOS = ['CLT','Temporário','Terceirizado','Estágio','PJ'];
const SITS = ['Ativo','Férias','Afastado','Afastado INSS','Demitido'];
const OCC_TIPOS = ['Falta','Falta Justificada','Atraso','Hora Extra','Advertência','Suspensão','Observação'];

const S = {p:'#4f46e5',bg:'#f1f5f9',card:'#fff',border:'#e2e8f0',text:'#1e293b',muted:'#64748b',success:'#10b981',warning:'#f59e0b',danger:'#ef4444',info:'#3b82f6',sidebar:'#1e1b4b'};
const iSt = {width:'100%',padding:'8px 10px',border:`1px solid #e2e8f0`,borderRadius:8,fontSize:14,color:'#1e293b',background:'#fff',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};

function rowToEmp(row){const e={};EMP_FIELDS.forEach((f,i)=>{e[f]=row[i]||'';});['vr','vt','fretado','ac','ferias'].forEach(k=>{e[k]=e[k]==='true';});return e;}
function empToRow(e){return EMP_FIELDS.map(f=>e[f]===undefined?'':String(e[f]));}
function rowToOcc(row){const o={};OCC_FIELDS.forEach((f,i)=>{o[f]=row[i]||'';});return o;}
function occToRow(o){return OCC_FIELDS.map(f=>o[f]===undefined?'':String(o[f]));}

function Btn({children,onClick,v='primary',sz='md',disabled=false,type='button',style={}}){
  const vs={primary:{background:'#4f46e5',color:'#fff',border:'none'},secondary:{background:'#fff',color:'#1e293b',border:'1px solid #e2e8f0'},danger:{background:'#ef4444',color:'#fff',border:'none'},success:{background:'#10b981',color:'#fff',border:'none'},ghost:{background:'transparent',color:'#64748b',border:'none'}};
  const ss={sm:{padding:'5px 10px',fontSize:12},md:{padding:'8px 16px',fontSize:14},lg:{padding:'11px 24px',fontSize:15}};
  return <button type={type} disabled={disabled} onClick={onClick} style={{...vs[v],...ss[sz],borderRadius:8,fontWeight:600,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,...style}}>{children}</button>;
}
function Field({label,children,error,span2=false}){return <div style={{gridColumn:span2?'1/-1':undefined,marginBottom:2}}><label style={{display:'block',fontSize:12,fontWeight:500,color:'#64748b',marginBottom:4}}>{label}</label>{children}{error&&<p style={{margin:'3px 0 0',fontSize:11,color:'#ef4444'}}>{error}</p>}</div>;}
function Inp(props){return <input style={iSt} {...props}/>;}
function Tx(props){return <textarea style={{...iSt,resize:'vertical'}} {...props}/>;}
function Sel({options=[],style={},...props}){return <select style={{...iSt,cursor:'pointer',...style}} {...props}>{options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}</select>;}
function Tog({checked,onChange,label}){return <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none'}}><div onClick={()=>onChange(!checked)} style={{width:38,height:20,borderRadius:10,cursor:'pointer',position:'relative',background:checked?'#4f46e5':'#e2e8f0',transition:'background 0.2s'}}><div style={{position:'absolute',top:2,left:checked?20:2,width:16,height:16,borderRadius:'50%',background:'white',transition:'left 0.2s'}}/></div>{label&&<span style={{fontSize:14,color:'#1e293b'}}>{label}</span>}</label>;}
function Card({children,style={}}){return <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:20,...style}}>{children}</div>;}
function Badge({children,color='default'}){const cs={default:['#f1f5f9','#475569'],success:['#d1fae5','#065f46'],warning:['#fef3c7','#92400e'],danger:['#fee2e2','#991b1b'],info:['#dbeafe','#1e40af']};const[bg,tc]=cs[color]||cs.default;return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:12,fontSize:12,fontWeight:600,background:bg,color:tc,whiteSpace:'nowrap'}}>{children}</span>;}
function Toast({msg,type='success'}){const tc={success:'#10b981',error:'#ef4444',info:'#3b82f6',warning:'#f59e0b'};return <div style={{position:'fixed',bottom:24,right:24,background:tc[type]||'#10b981',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:14,fontWeight:500,zIndex:9999}}>{msg}</div>;}
function Modal({title,children,onClose}){return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}><div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:480,maxHeight:'90vh',overflow:'auto'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid #e2e8f0'}}><h3 style={{margin:0,fontSize:16,fontWeight:700,color:'#1e293b'}}>{title}</h3><button onClick={onClose} style={{border:'none',background:'none',fontSize:22,cursor:'pointer',color:'#64748b'}}>×</button></div><div style={{padding:20}}>{children}</div></div></div>;}

function Sidebar({page,nav,alertCnt,user,onLogout}){
  const items=[{id:'dashboard',icon:'⊞',label:'Dashboard'},{id:'list',icon:'👥',label:'Funcionários'},{id:'occurrences',icon:'📋',label:'Ocorrências'},{id:'alerts',icon:'🔔',label:'Alertas',badge:alertCnt}];
  return <div style={{width:220,background:'#1e1b4b',display:'flex',flexDirection:'column',flexShrink:0}}>
    <div style={{padding:16,borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <div style={{width:34,height:34,background:'#4f46e5',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏢</div>
        <div><div style={{color:'#fff',fontWeight:700,fontSize:13}}>GestãoRH</div><div style={{color:'rgba(255,255,255,0.45)',fontSize:11}}>Mão de Obra</div></div>
      </div>
      <div style={{background:'rgba(255,255,255,0.08)',borderRadius:8,padding:'8px 10px',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:'#4f46e5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:600,flexShrink:0}}>{user?.name?user.name[0].toUpperCase():'U'}</div>
        <div style={{flex:1,minWidth:0}}><div style={{color:'#fff',fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.name||'Usuário'}</div><div style={{color:'rgba(255,255,255,0.45)',fontSize:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.email||''}</div></div>
      </div>
    </div>
    <nav style={{flex:1,padding:'10px 8px'}}>
      {items.map(item=>{const active=page===item.id;return <button key={item.id} onClick={()=>nav(item.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 12px',marginBottom:2,border:'none',cursor:'pointer',background:active?'rgba(255,255,255,0.14)':'transparent',color:active?'#fff':'rgba(255,255,255,0.6)',borderRadius:8,fontSize:14,fontWeight:active?600:400,textAlign:'left'}}><span style={{fontSize:15}}>{item.icon}</span><span style={{flex:1}}>{item.label}</span>{item.badge>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:10,fontSize:11,fontWeight:700,padding:'1px 6px',minWidth:18,textAlign:'center'}}>{item.badge}</span>}</button>;})}
    </nav>
    <div style={{padding:14,borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',flexDirection:'column',gap:8}}>
      <button onClick={()=>nav('form',null)} style={{width:'100%',padding:9,background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:600}}>+ Novo Funcionário</button>
      <button onClick={onLogout} style={{width:'100%',padding:7,background:'transparent',color:'rgba(255,255,255,0.45)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,cursor:'pointer',fontSize:12}}>Sair da conta</button>
    </div>
  </div>;
}

const EMPTY = {id:'',nome:'',cpf:'',rg:'',nasc:'',sexo:'M',tel:'',email:'',cep:'',rua:'',num:'',comp:'',bairro:'',cidade:'',uf:'',admissao:'',tipo:'CLT',fimContrato:'',sit:'Ativo',demissao:'',motivo:'',cargo:'',funcao:'',salario:'',cliente:'',vr:false,vrVal:'',vt:false,vtVal:'',fretado:false,ac:false,acVal:'',ferias:false,ferIni:'',ferFim:'',ferDias:'',banco:'',agencia:'',conta:'',tipoConta:'Corrente',pix:'',obs:''};

function Dashboard({employees,occurrences,nav}){
  const ativos=employees.filter(e=>e.sit==='Ativo').length;
  const emFerias=employees.filter(e=>e.sit==='Férias').length;
  const afastados=employees.filter(e=>e.sit.startsWith('Afastado')).length;
  const vencendo=employees.filter(e=>{if(!e.fimContrato||e.sit==='Demitido')return false;const d=daysTo(e.fimContrato);return d!==null&&d>=0&&d<=30;});
  const vencidos=employees.filter(e=>{if(!e.fimContrato||e.sit==='Demitido')return false;const d=daysTo(e.fimContrato);return d!==null&&d<0;});
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const recOccs=occurrences.filter(o=>new Date(o.data)>=cutoff);
  const stats=[{label:'Total Cadastrados',value:employees.length,icon:'👥',color:'#4f46e5'},{label:'Ativos',value:ativos,icon:'✅',color:'#10b981'},{label:'Em Férias',value:emFerias,icon:'🌴',color:'#3b82f6'},{label:'Afastados',value:afastados,icon:'⚕️',color:'#f59e0b'}];
  return <div>
    <h2 style={{margin:'0 0 20px',fontSize:22,fontWeight:700,color:'#1e293b'}}>Dashboard</h2>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      {stats.map(s=><Card key={s.label} style={{padding:16}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{margin:'0 0 4px',fontSize:12,color:'#64748b'}}>{s.label}</p><p style={{margin:0,fontSize:30,fontWeight:700,color:s.color}}>{s.value}</p></div><span style={{fontSize:26}}>{s.icon}</span></div></Card>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
      <Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><h3 style={{margin:0,fontSize:14,fontWeight:600}}>⚠️ Vencendo em 30 dias</h3><Badge color={vencendo.length>0?'warning':'success'}>{vencendo.length}</Badge></div>{vencendo.length===0?<p style={{color:'#64748b',fontSize:13,margin:0}}>Nenhum contrato vencendo.</p>:vencendo.slice(0,5).map(e=><div key={e.id} onClick={()=>nav('detail',e)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #e2e8f0',cursor:'pointer'}}><div><p style={{margin:0,fontSize:14,fontWeight:500}}>{e.nome}</p><p style={{margin:0,fontSize:11,color:'#64748b'}}>{[e.cargo,e.cliente].filter(Boolean).join(' • ')}</p></div><Badge color='warning'>{daysTo(e.fimContrato)}d</Badge></div>)}</Card>
      <Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><h3 style={{margin:0,fontSize:14,fontWeight:600}}>🔴 Contratos vencidos</h3><Badge color={vencidos.length>0?'danger':'success'}>{vencidos.length}</Badge></div>{vencidos.length===0?<p style={{color:'#64748b',fontSize:13,margin:0}}>Nenhum contrato vencido.</p>:vencidos.slice(0,5).map(e=><div key={e.id} onClick={()=>nav('detail',e)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #e2e8f0',cursor:'pointer'}}><div><p style={{margin:0,fontSize:14,fontWeight:500}}>{e.nome}</p><p style={{margin:0,fontSize:11,color:'#64748b'}}>{[e.cargo,e.cliente].filter(Boolean).join(' • ')}</p></div><Badge color='danger'>Vencido {fmt(e.fimContrato)}</Badge></div>)}</Card>
    </div>
    <Card><h3 style={{margin:'0 0 10px',fontSize:14,fontWeight:600}}>📋 Ocorrências recentes — {recOccs.length} registros (30 dias)</h3>{recOccs.length===0?<p style={{color:'#64748b',fontSize:13,margin:0}}>Nenhuma ocorrência nos últimos 30 dias.</p>:recOccs.slice(0,8).map(o=>{const emp=employees.find(e=>e.id===o.empId);return <div key={o.id} style={{display:'flex',gap:10,alignItems:'center',padding:'7px 0',borderBottom:'1px solid #e2e8f0'}}><Badge color={occClr(o.tipo)}>{o.tipo}</Badge><div style={{flex:1}}><span style={{fontSize:14,fontWeight:500}}>{emp?.nome||'—'}</span>{o.obs&&<span style={{fontSize:12,color:'#64748b'}}> — {o.obs}</span>}</div><span style={{fontSize:12,color:'#64748b'}}>{fmt(o.data)}</span></div>;})}</Card>
  </div>;
}

function EmpList({employees,nav,onDelete}){
  const [search,setSearch]=useState('');
  const [sit,setSit]=useState('all');
  const flt=employees.filter(e=>{const s=search.toLowerCase();return(!s||[e.nome,e.cpf,e.cargo,e.cliente].some(v=>(v||'').toLowerCase().includes(s)))&&(sit==='all'||e.sit===sit);});
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:700}}>Funcionários <span style={{fontSize:14,fontWeight:400,color:'#64748b'}}>({flt.length}/{employees.length})</span></h2>
      <Btn onClick={()=>nav('form',null)}>+ Novo Funcionário</Btn>
    </div>
    <Card style={{marginBottom:14,padding:'12px 16px'}}><div style={{display:'flex',gap:10,flexWrap:'wrap'}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar nome, CPF, cargo, empresa..." style={{flex:1,minWidth:200,...iSt}}/><Sel value={sit} onChange={e=>setSit(e.target.value)} style={{width:180}} options={[{v:'all',l:'Todas as situações'},...SITS.map(s=>({v:s,l:s}))]}/></div></Card>
    <Card style={{padding:0,overflow:'hidden'}}>
      {flt.length===0?<div style={{padding:40,textAlign:'center',color:'#64748b'}}><div style={{fontSize:40,marginBottom:8}}>👥</div><p style={{margin:'0 0 12px'}}>Nenhum funcionário encontrado.</p><Btn onClick={()=>nav('form',null)}>Cadastrar funcionário</Btn></div>:<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
        <thead><tr style={{background:'#f8fafc',borderBottom:'2px solid #e2e8f0'}}>{['Nome','CPF','Cargo','Empresa Cliente','Situação','Contrato',''].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',fontSize:12,fontWeight:600,color:'#64748b'}}>{h}</th>)}</tr></thead>
        <tbody>{flt.map(e=><tr key={e.id} onClick={()=>nav('detail',e)} style={{borderBottom:'1px solid #e2e8f0',cursor:'pointer'}} onMouseEnter={x=>x.currentTarget.style.background='#f8fafc'} onMouseLeave={x=>x.currentTarget.style.background='transparent'}>
          <td style={{padding:'9px 12px',fontSize:14,fontWeight:500}}>{e.nome}</td>
          <td style={{padding:'9px 12px',fontSize:13,color:'#64748b'}}>{e.cpf||'—'}</td>
          <td style={{padding:'9px 12px',fontSize:13}}>{e.cargo||'—'}</td>
          <td style={{padding:'9px 12px',fontSize:13}}>{e.cliente||'—'}</td>
          <td style={{padding:'9px 12px'}}><Badge color={sitClr[e.sit]}>{e.sit}</Badge></td>
          <td style={{padding:'9px 12px',fontSize:12,color:'#64748b'}}>{e.tipo}{e.fimContrato?` • ${fmt(e.fimContrato)}`:''}</td>
          <td style={{padding:'9px 12px'}} onClick={ev=>ev.stopPropagation()}><div style={{display:'flex',gap:4}}><Btn sz='sm' v='secondary' onClick={()=>nav('form',e)}>✏️</Btn><Btn sz='sm' v='secondary' onClick={()=>onDelete(e)}>🗑️</Btn></div></td>
        </tr>)}</tbody>
      </table></div>}
    </Card>
  </div>;
}

function EmpForm({emp,onSave,onCancel,saving}){
  const [d,setD]=useState({...EMPTY,...emp});
  const [tab,setTab]=useState(0);
  const [errs,setErrs]=useState({});
  const set=(k,v)=>setD(x=>({...x,[k]:v}));
  const TABS=['👤 Pessoal','🏠 Endereço','📄 Contrato','🎁 Benefícios','🏦 Banco','📝 Obs.'];
  function save(){const e={};if(!d.nome.trim())e.nome='Obrigatório';if(!d.admissao)e.admissao='Obrigatório';if(Object.keys(e).length){setErrs(e);setTab(0);return;}onSave(d);}
  const G={display:'grid',gridTemplateColumns:'1fr 1fr',gap:16};
  return <div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}><Btn v='ghost' onClick={onCancel}>← Voltar</Btn><h2 style={{margin:0,fontSize:20,fontWeight:700}}>{d.id?`Editar — ${d.nome}`:'Novo Funcionário'}</h2></div>
    <Card>
      <div style={{display:'flex',gap:0,marginBottom:20,borderBottom:'1px solid #e2e8f0',overflowX:'auto'}}>
        {TABS.map((t,i)=><button key={i} onClick={()=>setTab(i)} style={{padding:'8px 14px',border:'none',background:'transparent',cursor:'pointer',borderBottom:tab===i?'2px solid #4f46e5':'2px solid transparent',color:tab===i?'#4f46e5':'#64748b',fontWeight:tab===i?600:400,fontSize:13,whiteSpace:'nowrap',marginBottom:-1}}>{t}</button>)}
      </div>
      <div style={G}>
        {tab===0&&<><Field label="Nome Completo *" error={errs.nome} span2><Inp value={d.nome} onChange={e=>set('nome',e.target.value)} placeholder="Nome completo"/></Field>
          <Field label="CPF"><Inp value={d.cpf} onChange={e=>set('cpf',e.target.value)} placeholder="000.000.000-00"/></Field>
          <Field label="RG"><Inp value={d.rg} onChange={e=>set('rg',e.target.value)} placeholder="00.000.000-X"/></Field>
          <Field label="Data de Nascimento"><Inp type="date" value={d.nasc} onChange={e=>set('nasc',e.target.value)}/></Field>
          <Field label="Sexo"><Sel value={d.sexo} onChange={e=>set('sexo',e.target.value)} options={[{v:'M',l:'Masculino'},{v:'F',l:'Feminino'},{v:'O',l:'Outro'}]}/></Field>
          <Field label="Telefone"><Inp value={d.tel} onChange={e=>set('tel',e.target.value)} placeholder="(00) 00000-0000"/></Field>
          <Field label="E-mail" span2><Inp type="email" value={d.email} onChange={e=>set('email',e.target.value)} placeholder="email@exemplo.com"/></Field></>}
        {tab===1&&<><Field label="CEP"><Inp value={d.cep} onChange={e=>set('cep',e.target.value)} placeholder="00000-000"/></Field>
          <Field label="UF"><Inp value={d.uf} onChange={e=>set('uf',e.target.value)} placeholder="SP" maxLength={2}/></Field>
          <Field label="Logradouro" span2><Inp value={d.rua} onChange={e=>set('rua',e.target.value)} placeholder="Rua, Avenida..."/></Field>
          <Field label="Número"><Inp value={d.num} onChange={e=>set('num',e.target.value)} placeholder="123"/></Field>
          <Field label="Complemento"><Inp value={d.comp} onChange={e=>set('comp',e.target.value)} placeholder="Apto, Bloco..."/></Field>
          <Field label="Bairro"><Inp value={d.bairro} onChange={e=>set('bairro',e.target.value)} placeholder="Bairro"/></Field>
          <Field label="Cidade"><Inp value={d.cidade} onChange={e=>set('cidade',e.target.value)} placeholder="Cidade"/></Field></>}
        {tab===2&&<><Field label="Empresa Cliente" span2><Inp value={d.cliente} onChange={e=>set('cliente',e.target.value)} placeholder="Empresa onde o funcionário trabalha"/></Field>
          <Field label="Data de Admissão *" error={errs.admissao}><Inp type="date" value={d.admissao} onChange={e=>set('admissao',e.target.value)}/></Field>
          <Field label="Tipo de Contrato"><Sel value={d.tipo} onChange={e=>set('tipo',e.target.value)} options={TIPOS}/></Field>
          <Field label="Fim do Contrato"><Inp type="date" value={d.fimContrato} onChange={e=>set('fimContrato',e.target.value)}/></Field>
          <Field label="Situação"><Sel value={d.sit} onChange={e=>set('sit',e.target.value)} options={SITS}/></Field>
          <Field label="Cargo"><Inp value={d.cargo} onChange={e=>set('cargo',e.target.value)} placeholder="Ex: Operador de Produção"/></Field>
          <Field label="Função"><Inp value={d.funcao} onChange={e=>set('funcao',e.target.value)} placeholder="Ex: Auxiliar de Linha"/></Field>
          <Field label="Salário (R$)"><Inp type="number" value={d.salario} onChange={e=>set('salario',e.target.value)} placeholder="0.00"/></Field>

          <div style={{borderTop:'1px solid #e2e8f0',paddingTop:14}}>

            </div>}

        {tab===4&&<><div style={{gridColumn:'1/-1',padding:'8px 12px',background:'#fef9c3',borderRadius:8,fontSize:13,color:'#92400e'}}>⚠️ Dados apenas para referência interna. Pagamentos gerenciados externamente.</div>

    {title:'🌴 Em Férias',color:'info',items:employees.filter(e=>e.sit==='Férias')},

function App(){
  const [token,setToken]=useState(null);
  const [user,setUser]=useState(null);
  const [sheetId,setSheetId]=useState(null);
  const [employees,setEmps]=useState([]);
  const [occurrences,setOccs]=useState([]);
  const [status,setStatus]=useState('idle');
  const [page,setPage]=useState('dashboard');
  const [activeEmp,setActiveEmp]=useState(null);
  const [toast,setToast]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [saving,setSaving]=useState(false);

  const notify=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  async function initSheet(tok){
    const listR=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%22GestaoRH-Sistema%22%20and%20mimeType%3D%22application%2Fvnd.google-apps.spreadsheet%22',{headers:{Authorization:`Bearer ${tok}`}});
    const listD=await listR.json();
    if(listD.files?.length>0)return listD.files[0].id;
    const createR=await fetch('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({properties:{title:'GestaoRH-Sistema'},sheets:[{properties:{title:'Funcionarios'}},{properties:{title:'Ocorrencias'}}]})});
    const sheet=await createR.json();
    const sid=sheet.spreadsheetId;
    const ec=String.fromCharCode(65+EMP_FIELDS.length-1);
    const oc=String.fromCharCode(65+OCC_FIELDS.length-1);
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Funcionarios!A1:${ec}1:append?valueInputOption=RAW`,{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({values:[EMP_FIELDS]})});
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Ocorrencias!A1:${oc}1:append?valueInputOption=RAW`,{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({values:[OCC_FIELDS]})});
    return sid;
  }

  async function loadData(tok,sid){
    const [er,or]=await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Funcionarios`,{headers:{Authorization:`Bearer ${tok}`}}).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Ocorrencias`,{headers:{Authorization:`Bearer ${tok}`}}).then(r=>r.json())
    ]);
    setEmps((er.values||[]).slice(1).filter(r=>r[0]).map(rowToEmp));
    setOccs((or.values||[]).slice(1).filter(r=>r[0]).map(rowToOcc));
  }

  function login(){
    
    const params=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:"https://gestao-rh-steel.vercel.app",response_type:'token',scope:SCOPES,prompt:'select_account'});
    window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  }

  function logout(){setToken(null);setUser(null);setSheetId(null);setEmps([]);setOccs([]);setStatus('idle');}

  useEffect(()=>{
    const hash=window.location.hash;
    if(hash.includes('access_token')){
      const p=new URLSearchParams(hash.substring(1));
      const tok=p.get('access_token');
      window.history.replaceState(null,'',window.location.pathname);
      if(tok){
        setToken(tok);setStatus('loading');
        fetch('https://www.googleapis.com/oauth2/v1/userinfo',{headers:{Authorization:`Bearer ${tok}`}}).then(r=>r.json()).then(u=>setUser({name:u.name,email:u.email}));
        initSheet(tok).then(sid=>{setSheetId(sid);return loadData(tok,sid);}).then(()=>setStatus('ready')).catch(e=>{notify(e.message,'error');setStatus('error');});
      }
    }
  },[]);

  async function saveEmployee(emp){
    setSaving(true);
    try{
      if(emp.id){
        const getData=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Funcionarios`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
        const rows=getData.values||[];
        const rowIdx=rows.findIndex((r,i)=>i>0&&r[0]===emp.id);
        if(rowIdx>=0){const col=String.fromCharCode(65+EMP_FIELDS.length-1);await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Funcionarios!A${rowIdx+1}:${col}${rowIdx+1}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({values:[empToRow(emp)]})});}
        setEmps(prev=>prev.map(e=>e.id===emp.id?emp:e));notify('Funcionário atualizado!');
      }else{
        const newEmp={...emp,id:genId(),createdAt:new Date().toISOString()};
        const col=String.fromCharCode(65+EMP_FIELDS.length-1);
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Funcionarios!A:${col}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({values:[empToRow(newEmp)]})});
        setEmps(prev=>[...prev,newEmp]);notify('Funcionário salvo no Google Sheets!');
      }
      nav('list');
    }catch(e){notify(e.message,'error');}
    setSaving(false);
  }

  async function deleteEmployee(id){
    try{
      const getData=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Funcionarios`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
      const rows=getData.values||[];
      const rowIdx=rows.findIndex((r,i)=>i>0&&r[0]===id);
      if(rowIdx>=0){
        const sheetInfo=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=sheets.properties`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
        const sh=sheetInfo.sheets.find(s=>s.properties.title==='Funcionarios');
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}:batchUpdate`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:sh.properties.sheetId,dimension:'ROWS',startIndex:rowIdx,endIndex:rowIdx+1}}}]})});
      }
      setEmps(prev=>prev.filter(e=>e.id!==id));setOccs(prev=>prev.filter(o=>o.empId!==id));setConfirmDel(null);notify('Removido.','info');
      if(page==='detail')nav('list');
    }catch(e){notify(e.message,'error');}
  }

  async function saveOccurrence(occ){
    try{
      const newOcc={...occ,id:genId(),createdAt:new Date().toISOString()};
      const col=String.fromCharCode(65+OCC_FIELDS.length-1);
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Ocorrencias!A:${col}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({values:[occToRow(newOcc)]})});
      setOccs(prev=>[...prev,newOcc]);notify('Ocorrência registrada!');
    }catch(e){notify(e.message,'error');}
  }

  async function deleteOccurrence(id){
    try{
      const getData=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Ocorrencias`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
      const rows=getData.values||[];
      const rowIdx=rows.findIndex((r,i)=>i>0&&r[0]===id);
      if(rowIdx>=0){
        const sheetInfo=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?fields=sheets.properties`,{headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
        const sh=sheetInfo.sheets.find(s=>s.properties.title==='Ocorrencias');
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}:batchUpdate`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:sh.properties.sheetId,dimension:'ROWS',startIndex:rowIdx,endIndex:rowIdx+1}}}]})});
      }
      setOccs(prev=>prev.filter(o=>o.id!==id));notify('Removida.','info');
    }catch(e){notify(e.message,'error');}
  }

  function nav(p,emp=undefined){setPage(p);if(emp!==undefined)setActiveEmp(emp);}
  const alertCnt=employees.filter(e=>{if(!e.fimContrato||e.sit==='Demitido')return false;const d=daysTo(e.fimContrato);return d!==null&&d<=30;}).length;
  const curEmp=activeEmp?employees.find(e=>e.id===activeEmp.id)||activeEmp:null;

  if(!token||status==='idle') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f1f5f9'}}>
      <div style={{background:'#fff',borderRadius:16,padding:40,maxWidth:400,width:'100%',textAlign:'center',border:'1px solid #e2e8f0'}}>
        <div style={{width:56,height:56,background:'#4f46e5',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 16px'}}>🏢</div>
        <h1 style={{margin:'0 0 8px',fontSize:24,fontWeight:700,color:'#1e293b'}}>GestãoRH</h1>
        <p style={{margin:'0 0 8px',color:'#64748b',fontSize:15}}>Sistema de gestão de mão de obra</p>
        <p style={{margin:'0 0 28px',color:'#166534',fontSize:13,padding:'10px 14px',background:'#f0fdf4',borderRadius:8}}>✅ Dados salvos no seu Google Sheets</p>
        <button onClick={login} style={{width:'100%',padding:'12px 20px',background:'#4285f4',color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          <span style={{fontSize:18}}>G</span> Entrar com Google
        </button>
        <p style={{margin:'16px 0 0',fontSize:12,color:'#64748b'}}>Seus dados ficam na sua conta Google.<br/>Acesse de qualquer computador.</p>
      </div>
    </div>
  );

  if(status==='loading') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f1f5f9'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:44,height:44,border:'4px solid #e2e8f0',borderTopColor:'#4f46e5',borderRadius:'50%',animation:'spin 0.7s linear infinite',margin:'0 auto 14px'}}/>
        <p style={{color:'#64748b',margin:'0 0 6px',fontWeight:500}}>Conectando ao Google Sheets...</p>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    </div>
  );

  return <div style={{display:'flex',height:'100vh',fontFamily:'system-ui,-apple-system,sans-serif',background:'#f1f5f9',overflow:'hidden'}}>
    <Sidebar page={page} nav={nav} alertCnt={alertCnt} user={user} onLogout={logout}/>
    <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'11px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <span style={{fontSize:13,color:'#64748b',fontWeight:500}}>{({dashboard:'🏠 Dashboard',list:'👥 Funcionários',form:curEmp?.id?'✏️ Editar':'➕ Novo',detail:`👤 ${curEmp?.nome||''}`,occurrences:'📋 Ocorrências',alerts:'🔔 Alertas'})[page]}</span>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:13,color:'#64748b'}}>{employees.filter(e=>e.sit==='Ativo').length} ativos · {employees.length} total</span>
          <span style={{fontSize:11,color:'#166534',background:'#f0fdf4',padding:'3px 8px',borderRadius:6,fontWeight:500}}>✅ Google Sheets</span>
        </div>
      </div>
      <div style={{flex:1,padding:24,overflow:'auto'}}>
        {page==='dashboard'&&<Dashboard employees={employees} occurrences={occurrences} nav={nav}/>}
        {page==='list'&&<EmpList employees={employees} nav={nav} onDelete={setConfirmDel}/>}
        {page==='form'&&<EmpForm emp={curEmp||{...EMPTY}} onSave={saveEmployee} onCancel={()=>nav('list')} saving={saving}/>}
        {page==='detail'&&curEmp&&<EmpDetail emp={curEmp} occurrences={occurrences.filter(o=>o.empId===curEmp.id)} nav={nav} onDelete={setConfirmDel} onSaveOcc={saveOccurrence} onDeleteOcc={deleteOccurrence}/>}
        {page==='occurrences'&&<OccsPage employees={employees} occurrences={occurrences} onSave={saveOccurrence} onDelete={deleteOccurrence}/>}
        {page==='alerts'&&<AlertsPage employees={employees} nav={nav}/>}
      </div>
    </div>
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    {confirmDel&&<Modal title="Confirmar exclusão" onClose={()=>setConfirmDel(null)}>
      <p style={{margin:'0 0 20px',color:'#1e293b'}}>Deseja remover <strong>{confirmDel.nome}</strong>? Todas as ocorrências também serão excluídas.</p>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><Btn v='secondary' onClick={()=>setConfirmDel(null)}>Cancelar</Btn><Btn v='danger' onClick={()=>deleteEmployee(confirmDel.id)}>Confirmar</Btn></div>
    </Modal>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
